<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รวมคำสั่งปลั๊กอิน AVO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:system-ui,sans-serif;
  min-height:100vh;
  padding:60px 40px 120px;
  overflow-x:hidden;
  color:white;
  background:
    radial-gradient(circle at top left,#7c3aed66,transparent 35%),
    radial-gradient(circle at bottom right,#2563eb66,transparent 35%),
    #020617;
}
h1{
  text-align:center;
  font-size:clamp(1.8rem,5vw,3.5rem);
  margin-bottom:80px;
  background:linear-gradient(135deg,#fff,#d8b4fe,#93c5fd);
  -webkit-background-clip:text;
  color:transparent;
}
.deck{
  display:flex;
  flex-wrap:wrap;
  row-gap:90px;
  padding:40px 100px 40px 0;
  max-width:1200px;
  margin:0 auto;
}
.card{
  width:200px;
  height:280px;
  flex-shrink:0;
  margin-right:-72px;
  border-radius:22px;
  text-decoration:none;
  color:white;
  position:relative;
  backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:0 14px 40px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);
  transition:transform .38s cubic-bezier(.34,1.56,.64,1),box-shadow .38s;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px 16px;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:linear-gradient(155deg,rgba(255,255,255,.18) 0%,transparent 55%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-38px) scale(1.14);
  z-index:9999 !important;
  box-shadow:0 50px 110px rgba(0,0,0,.75),0 0 40px rgba(255,255,255,.06);
}
.icon{
  position:absolute;
  top:18px;
  left:16px;
  font-size:2.8rem;
  line-height:1;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,.4));
}
.num{
  position:absolute;
  top:20px;
  right:14px;
  font-size:.65rem;
  font-weight:700;
  opacity:.35;
  letter-spacing:1px;
}
.name{
  font-size:.92rem;
  font-weight:700;
  line-height:1.3;
  margin-bottom:5px;
  word-break:break-all;
}
.desc{
  font-size:.67rem;
  opacity:.6;
  line-height:1.45;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.lang{
  margin-top:9px;
  font-size:.64rem;
  opacity:.45;
  letter-spacing:.4px;
}
</style>
</head>
<body>
<h1>รวมคำสั่งปลั๊กอิน AVO</h1>
<div class="deck" id="repos"></div>

<script>
const USERNAME="AOTGTR";
const HIDDEN=["AVOTower","disTime","mumu_div"];
const ICONS=["⚡","🗺️","🎮","🏹","🐷","⚔️","🏰","🎯","🧩","🚀","🌟","💫","🔥","✨","🎪","🎲","🛸","🌊"];
const COLORS=[
  "linear-gradient(145deg,rgba(124,58,237,.38),rgba(67,20,180,.1))",
  "linear-gradient(145deg,rgba(37,99,235,.38),rgba(14,60,200,.1))",
  "linear-gradient(145deg,rgba(219,39,119,.38),rgba(157,23,77,.1))",
  "linear-gradient(145deg,rgba(5,150,105,.38),rgba(4,120,87,.1))",
  "linear-gradient(145deg,rgba(217,119,6,.38),rgba(180,83,9,.1))",
  "linear-gradient(145deg,rgba(220,38,38,.38),rgba(153,27,27,.1))",
  "linear-gradient(145deg,rgba(79,70,229,.38),rgba(55,48,163,.1))",
  "linear-gradient(145deg,rgba(2,132,199,.38),rgba(3,105,161,.1))",
  "linear-gradient(145deg,rgba(168,85,247,.38),rgba(126,34,206,.1))",
];

fetch(`https://api.github.com/users/${USERNAME}/repos?per_page=100`)
.then(r=>r.json())
.then(repos=>{
  const box=document.getElementById("repos");
  const visible=repos
    .filter(r=>r.has_pages&&!HIDDEN.includes(r.name))
    .sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));

  visible.forEach((repo,i)=>{
    const card=document.createElement("a");
    card.className="card";
    card.href=`https://${USERNAME.toLowerCase()}.github.io/${repo.name}/`;
    card.target="_blank";
    card.style.zIndex=i+1;
    card.style.background=COLORS[i%COLORS.length];

    card.innerHTML=`
<div class="icon">${ICONS[i%ICONS.length]}</div>
<div class="num">#${String(i+1).padStart(2,"0")}</div>
<div class="name">${repo.name}</div>
${repo.description?`<div class="desc">${repo.description}</div>`:""}
${repo.language?`<div class="lang">● ${repo.language}</div>`:""}`;

    box.appendChild(card);
  });
});
</script>
</body>
</html>
